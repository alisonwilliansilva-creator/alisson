<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

</head>

    <section class="cards">

        <div class="card">
            <h2>🌍 Sustentabilidade</h2>

            <p>
                Preservar o meio ambiente é garantir o futuro.
            </p>
        </div>

        <div class="card">
            <h2>🚜 Tecnologia</h2>

            <p>
                Máquinas modernas ajudam na produção agrícola.
            </p>
        </div>

        <div class="card">
            <h2>💧 Água</h2>

            <p>
                O uso consciente da água é essencial.
            </p>
        </div>

    </section>

    <section class="contador">

        <h2>
            Pessoas Impactadas
        </h2>

        <div id="numero">
            0
        </div>

    </section>

    <footer>

        <p id="relogio">
            00:00:00
        </p>

    </footer>

    <script src="script.js"></script>

</html>
